<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resonancia Armónica Ultra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input[type=range] { accent-color: #6366f1; cursor: pointer; }
        .session-card { border-left: 5px solid #6366f1; transition: all 0.2s; }
        .session-card:active { transform: scale(0.98); }
        .freq-btn { transition: all 0.2s; font-size: 10px; font-weight: bold; height: 44px; display: flex; align-items: center; justify-content: center; }
        .freq-btn:active { transform: scale(0.9); }
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-slate-950 min-h-screen flex items-center justify-center p-4 font-sans text-slate-800">

    <div id="pin-screen" class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md text-center">
        <div class="w-16 h-16 bg-indigo-50 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">🔐</div>
        <h1 class="text-xl font-black mb-6 tracking-tighter uppercase">Sistema de Resonancia</h1>
        <input type="password" id="pin-input" placeholder="PIN" class="w-full text-center text-4xl p-4 border-2 rounded-2xl mb-6 outline-none focus:border-indigo-500 font-mono">
        <button onclick="checkPin()" class="w-full py-5 bg-indigo-600 text-white rounded-2xl font-black shadow-xl uppercase tracking-widest">Entrar</button>
    </div>

    <div id="main-app" class="hidden w-full max-w-md bg-slate-50 rounded-[3rem] shadow-2xl overflow-hidden border-4 border-white/10">
        <div class="bg-indigo-600 p-6 text-white text-center">
            <h1 class="text-2xl font-black italic uppercase leading-none">Resonancia Armónica</h1>
            <p class="text-[9px] tracking-[0.3em] opacity-80 font-bold mt-2">SISTEMA POLIFÓNICO PROFESIONAL</p>
        </div>

        <div class="p-5 space-y-4">
            <div class="grid grid-cols-3 gap-2">
                <button onclick="addFreq(396)" class="freq-btn bg-white border border-slate-200 rounded-xl text-red-600 shadow-sm">UT 396Hz</button>
                <button onclick="addFreq(417)" class="freq-btn bg-white border border-slate-200 rounded-xl text-orange-600 shadow-sm">RE 417Hz</button>
                <button onclick="addFreq(528)" class="freq-btn bg-white border border-slate-200 rounded-xl text-emerald-600 shadow-sm">MI 528Hz</button>
                <button onclick="addFreq(639)" class="freq-btn bg-white border border-slate-200 rounded-xl text-blue-600 shadow-sm">FA 639Hz</button>
                <button onclick="addFreq(741)" class="freq-btn bg-white border border-slate-200 rounded-xl text-indigo-600 shadow-sm">SOL 741Hz</button>
                <button onclick="addFreq(852)" class="freq-btn bg-white border border-slate-200 rounded-xl text-purple-600 shadow-sm">LA 852Hz</button>
                <button onclick="addFreq(7.83)" class="freq-btn bg-indigo-600 text-white rounded-xl col-span-3 shadow-md">🌍 FRECUENCIA SCHUMANN 7.83 HZ</button>
            </div>

            <div class="bg-slate-900 rounded-3xl p-5 shadow-inner">
                <label class="text-[9px] font-bold text-indigo-400 uppercase block text-center mb-1">Frecuencias en uso (sep. por comas)</label>
                <input type="text" id="freq-input" value="440, 528" 
                       class="bg-transparent w-full text-2xl font-mono text-indigo-400 outline-none text-center border-b border-indigo-900/50 pb-2">
                <button onclick="clearFreqs()" class="text-[9px] text-slate-500 w-full mt-2 uppercase font-bold hover:text-white">Limpiar Laboratorio</button>
            </div>

            <div class="space-y-4 bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                <div>
                    <div class="flex justify-between text-[10px] font-bold text-slate-400 uppercase mb-1"><span>Volumen Master</span> <span id="vol-txt">50%</span></div>
                    <input type="range" id="vol-input" min="0" max="1" step="0.01" value="0.5" oninput="updateUI()" class="w-full">
                </div>
                <div>
                    <div class="flex justify-between text-[10px] font-bold text-slate-400 uppercase mb-1"><span>Separación Binaural</span> <span id="bin-txt">0%</span></div>
                    <input type="range" id="bin-input" min="0" max="20" step="0.1" value="0" oninput="updateUI()" class="w-full">
                </div>
            </div>

            <button id="play-btn" onclick="toggleTerapia()" class="w-full py-6 bg-slate-900 text-white rounded-[2rem] text-xl font-black shadow-xl active:scale-95 transition-all uppercase tracking-tighter">Iniciar Terapia</button>

            <div class="pt-4 border-t border-slate-200">
                <div class="flex items-center justify-between mb-3">
                    <h2 class="text-[10px] font-black text-slate-400 uppercase flex items-center gap-1 leading-none">📂 Mis Protocolos Guardados</h2>
                    <button onclick="saveSession()" class="bg-indigo-600 text-white px-4 py-2 rounded-xl text-[9px] font-bold shadow-md">GUARDAR ACTUAL</button>
                </div>
                <input type="text" id="session-name" placeholder="Nombre (ej: Protocolo Respiratorio)" class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-sm mb-3 outline-none focus:ring-2 ring-indigo-500">
                
                <div id="sessions-list" class="space-y-2 max-h-48 overflow-y-auto pr-1"></div>
            </div>
        </div>
    </div>

    <script>
        const PIN = "AGUSTIN";
        let audioCtx = null, oscillators = [], isRunning = false;

        function checkPin() {
            if(document.getElementById('pin-input').value.toUpperCase() === PIN) {
                document.getElementById('pin-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
            }
        }

        function addFreq(val) {
            let input = document.getElementById('freq-input');
            let freqs = input.value.split(',').map(v => v.trim()).filter(v => v !== "");
            if(!freqs.includes(val.toString())) freqs.push(val);
            input.value = freqs.join(', ');
            if(isRunning) restartAudio();
        }

        function clearFreqs() { 
            document.getElementById('freq-input').value = ""; 
            if(isRunning) stopAll();
        }

        function updateUI() {
            document.getElementById('vol-txt').innerText = Math.round(document.getElementById('vol-input').value * 100) + "%";
            document.getElementById('bin-txt').innerText = Math.round((document.getElementById('bin-input').value / 20) * 100) + "%";
            if(isRunning) restartAudio();
        }

        function stopAll() {
            oscillators.forEach(o => { try { o.stop(); } catch(e) {} });
            oscillators = [];
        }

        function restartAudio() { stopAll(); playAll(); }

        function playAll() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const freqs = document.getElementById('freq-input').value.split(',').map(f => parseFloat(f.trim())).filter(f => !isNaN(f));
            const vol = parseFloat(document.getElementById('vol-input').value) / (freqs.length || 1);
            const bin = parseFloat(document.getElementById('bin-input').value);

            freqs.forEach(f => {
                const oscL = audioCtx.createOscillator();
                const panL = audioCtx.createStereoPanner();
                oscL.frequency.value = f;
                panL.pan.value = -1;

                const oscR = audioCtx.createOscillator();
                const panR = audioCtx.createStereoPanner();
                oscR.frequency.value = f + bin;
                panR.pan.value = 1;

                const gain = audioCtx.createGain();
                gain.gain.value = vol;

                oscL.connect(panL).connect(gain);
                oscR.connect(panR).connect(gain);
                gain.connect(audioCtx.destination);

                oscL.start(); oscR.start();
                oscillators.push(oscL, oscR);
            });
        }

        function toggleTerapia() {
            const btn = document.getElementById('play-btn');
            if (!isRunning) {
                isRunning = true; playAll();
                btn.innerText = "Detener Terapia"; btn.classList.replace('bg-slate-900', 'bg-red-600');
            } else {
                isRunning = false; stopAll();
                btn.innerText = "Iniciar Terapia"; btn.classList.replace('bg-red-600', 'bg-slate-900');
            }
        }

        function saveSession() {
            const name = document.getElementById('session-name').value || "Protocolo Nuevo";
            const freqs = document.getElementById('freq-input').value;
            const bin = document.getElementById('bin-input').value;
            let sessions = JSON.parse(localStorage.getItem('resonancia_pro_v2') || '[]');
            sessions.unshift({ name, freqs, bin });
            localStorage.setItem('resonancia_pro_v2', JSON.stringify(sessions));
            document.getElementById('session-name').value = "";
            renderSessions();
        }

        function renderSessions() {
            const sessions = JSON.parse(localStorage.getItem('resonancia_pro_v2') || '[]');
            document.getElementById('sessions-list').innerHTML = sessions.map((s, i) => `
                <div class="session-card bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-slate-100" onclick="loadSession(${i})">
                    <div class="flex-1">
                        <p class="font-black text-[11px] text-slate-800 uppercase tracking-tighter">${s.name}</p>
                        <p class="text-[9px] text-indigo-600 font-mono font-bold">${s.freqs} Hz</p>
                    </div>
                    <button onclick="event.stopPropagation(); deleteSession(${i})" class="text-slate-300 hover:text-red-500 font-bold px-2 text-xl">✕</button>
                </div>
            `).join('');
        }

        function loadSession(i) {
            const sessions = JSON.parse(localStorage.getItem('resonancia_pro_v2') || '[]');
            document.getElementById('freq-input').value = sessions[i].freqs;
            document.getElementById('bin-input').value = sessions[i].bin;
            updateUI();
        }

        function deleteSession(i) {
            let sessions = JSON.parse(localStorage.getItem('resonancia_pro_v2') || '[]');
            sessions.splice(i, 1);
            localStorage.setItem('resonancia_pro_v2', JSON.stringify(sessions));
            renderSessions();
        }
        renderSessions();
    </script>
</body>
</html>
