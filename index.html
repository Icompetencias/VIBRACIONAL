<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmacia Vibracional</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Animaciones personalizadas para emular animate-in */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideInFromTop { from { transform: translateY(-10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .animate-in { animation: fadeIn 0.3s ease-out forwards; }
        .fade-in { animation-name: fadeIn; }
        .zoom-in { animation-name: zoomIn; }
        .slide-in-from-top-1 { animation: slideInFromTop 0.2s ease-out forwards; }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        
        input[type="range"] { accent-color: #4f46e5; }
    </style>
</head>
<body class="bg-zinc-50">
    <div id="root"></div>

    <!-- Scripts: React, Babel (para JSX), Lucide -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="text/babel">
        const { useState, useRef, useEffect, useMemo } = React;

        // Helper para renderizar iconos de Lucide en modo Standalone
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current) {
                    lucide.createIcons({
                        attrs: {
                            class: className,
                            width: size,
                            height: size,
                            "stroke-width": 2
                        },
                        name: name,
                        element: iconRef.current
                    });
                }
            }, [name, size, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        function App() {
            // --- ESTADOS ---
            const [frequenciesInput, setFrequenciesInput] = useState('440, 528');
            const [duration, setDuration] = useState(5);
            const [volume, setVolume] = useState(0.5);
            const [isPlaying, setIsPlaying] = useState(false);
            const [isRecording, setIsRecording] = useState(false);
            const [recordingFormat, setRecordingFormat] = useState('wav');
            const [binauralPan, setBinauralPan] = useState(0.8);
            const [savedProtocols, setSavedProtocols] = useState([]);
            const [isSaving, setIsSaving] = useState(false);
            const [newProtocolName, setNewProtocolName] = useState('');
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [pinEntry, setPinEntry] = useState('');
            const [error, setError] = useState('');

            // --- REFS ---
            const audioContextRef = useRef(null);
            const oscillatorsRef = useRef([]);
            const gainNodeRef = useRef(null);
            const masterGainNodeRef = useRef(null);
            const pannerNodeRef = useRef(null);
            const compressorNodeRef = useRef(null);
            const timerRef = useRef(null);
            const mediaRecorderRef = useRef(null);
            const canvasRef = useRef(null);
            const analyserRef = useRef(null);
            const animationFrameRef = useRef(null);
            const recordedChunksRef = useRef([]);
            const stopStateTimeoutRef = useRef(null);

            const presets = [
                { name: 'UT - 396 Hz', freq: [396], color: 'bg-red-100 text-red-700' },
                { name: 'RE - 417 Hz', freq: [417], color: 'bg-orange-100 text-orange-700' },
                { name: 'MI - 528 Hz', freq: [528], color: 'bg-yellow-100 text-yellow-700' },
                { name: 'FA - 639 Hz', freq: [639], color: 'bg-green-100 text-green-700' },
                { name: 'SOL - 741 Hz', freq: [741], color: 'bg-blue-100 text-blue-700' },
                { name: 'LA - 852 Hz', freq: [852], color: 'bg-indigo-100 text-indigo-700' },
                { name: 'Schumann 7.83 Hz', freq: [200, 207.83], color: 'bg-purple-100 text-purple-700' },
            ];

            useEffect(() => {
                const saved = localStorage.getItem('harmonic_protocols');
                if (saved) {
                    try { setSavedProtocols(JSON.parse(saved)); } catch (e) { console.error(e); }
                }
            }, []);

            // --- LÓGICA DE AUDIO ---
            const drawVisualizations = () => {
                if (!canvasRef.current || !analyserRef.current) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                if (!ctx) return;
                const bufferLength = analyserRef.current.frequencyBinCount;
                const timeData = new Uint8Array(bufferLength);
                analyserRef.current.getByteTimeDomainData(timeData);
                ctx.fillStyle = 'rgb(10, 10, 10)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.lineWidth = 2;
                ctx.strokeStyle = 'rgb(99, 102, 241)';
                ctx.beginPath();
                const sliceWidth = canvas.width * 1.0 / bufferLength;
                let x = 0;
                for (let i = 0; i < bufferLength; i++) {
                    const v = timeData[i] / 128.0;
                    const y = v * canvas.height / 2;
                    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                    x += sliceWidth;
                }
                ctx.lineTo(canvas.width, canvas.height / 2);
                ctx.stroke();
                animationFrameRef.current = requestAnimationFrame(drawVisualizations);
            };

            const downloadBlob = (blob, name) => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = name;
                a.click();
                URL.revokeObjectURL(url);
            };

            const encodeWAV = (samples, sampleRate) => {
                const buffer = new ArrayBuffer(44 + samples.length * 2);
                const view = new DataView(buffer);
                const writeString = (o, s) => { for (let i = 0; i < s.length; i++) view.setUint8(o + i, s.charCodeAt(i)); };
                writeString(0, 'RIFF');
                view.setUint32(4, 32 + samples.length * 2, true);
                writeString(8, 'WAVE');
                writeString(12, 'fmt ');
                view.setUint32(16, 16, true);
                view.setUint16(20, 1, true);
                view.setUint16(22, 1, true);
                view.setUint32(24, sampleRate, true);
                view.setUint32(28, sampleRate * 2, true);
                view.setUint16(32, 2, true);
                view.setUint16(34, 16, true);
                writeString(36, 'data');
                view.setUint32(40, samples.length * 2, true);
                for (let i = 0; i < samples.length; i++) {
                    const s = Math.max(-1, Math.min(1, samples[i]));
                    view.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
                }
                return new Blob([view], { type: 'audio/wav' });
            };

            const playAudio = async () => {
                const ctx = audioContextRef.current || new (window.AudioContext || window.webkitAudioContext)();
                audioContextRef.current = ctx;
                if (ctx.state === 'suspended') await ctx.resume();
                const freqs = frequenciesInput.split(',').map(f => parseFloat(f.trim())).filter(f => !isNaN(f) && f > 0);
                if (freqs.length === 0) return alert("Ingresa frecuencias válidas");
                stopAudio(true);
                const startTime = ctx.currentTime + 0.05;
                const masterGain = ctx.createGain();
                masterGain.gain.value = volume;
                masterGainRef.current = masterGain;
                const compressor = ctx.createDynamicsCompressor();
                const gainMain = ctx.createGain();
                gainMain.gain.setValueAtTime(0, startTime);
                gainMain.gain.linearRampToValueAtTime(1.0, startTime + 0.1);
                gainNodeRef.current = gainMain;
                const analyser = ctx.createAnalyser();
                analyserRef.current = analyser;
                const panner = ctx.createStereoPanner();
                const indGain = 0.9 / Math.sqrt(freqs.length);
                freqs.forEach((f, i) => {
                    const osc = ctx.createOscillator();
                    const g = ctx.createGain();
                    const p = ctx.createStereoPanner();
                    osc.type = 'sine'; osc.frequency.setValueAtTime(f, startTime);
                    g.gain.setValueAtTime(0, startTime); g.gain.linearRampToValueAtTime(indGain, startTime + 0.1);
                    if (freqs.length === 2) p.pan.setValueAtTime(i === 0 ? -binauralPan : binauralPan, startTime);
                    else if (freqs.length > 2) p.pan.setValueAtTime(Math.sin(i * (Math.PI/freqs.length)*2)*binauralPan, startTime);
                    osc.connect(g); g.connect(p); p.connect(gainMain);
                    oscillatorsRef.current.push(osc); osc.start(startTime);
                });
                gainMain.connect(analyser); analyser.connect(masterGain); masterGain.connect(panner);
                panner.connect(compressor); compressor.connect(ctx.destination);
                setIsPlaying(true); drawVisualizations();
                if (duration > 0) {
                    const total = duration * 60;
                    gainMain.gain.setValueAtTime(1.0, startTime + total - 0.1);
                    gainMain.gain.linearRampToValueAtTime(0, startTime + total);
                    timerRef.current = setTimeout(stopAudio, (total + 0.2) * 1000);
                }
            };

            const stopAudio = (reset = false) => {
                const ctx = audioContextRef.current;
                const gn = gainNodeRef.current;
                if (!reset) setIsPlaying(false);
                if (ctx && gn) {
                    const time = ctx.currentTime + 0.15;
                    gn.gain.linearRampToValueAtTime(0, time);
                    oscillatorsRef.current.forEach(o => { try{o.stop(time);}catch(e){} });
                }
                oscillatorsRef.current = [];
                if (timerRef.current) clearTimeout(timerRef.current);
                if (animationFrameRef.current) cancelAnimationFrame(animationFrameRef.current);
            };

            const handlePinSubmit = (e) => {
                e.preventDefault();
                if (pinEntry.trim().toUpperCase() === 'AGUSTIN') setIsAuthenticated(true);
                else { setError('Contraseña incorrecta'); setPinEntry(''); }
            };

            // --- RENDER ---
            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen bg-zinc-950 flex items-center justify-center p-4">
                        <div className="bg-zinc-900 p-8 rounded-3xl shadow-2xl border border-zinc-800 w-full max-w-md animate-in zoom-in">
                            <div className="text-center mb-8">
                                <div className="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                                    <Icon name="play" size={32} className="text-white fill-current" />
                                </div>
                                <h1 className="text-2xl font-bold text-white mb-2">Farmacia Vibracional</h1>
                                <p className="text-zinc-400 text-sm">Ingrese su clave para continuar</p>
                            </div>
                            <form onSubmit={handlePinSubmit} className="space-y-4">
                                <input type="password" value={pinEntry} onChange={e=>setPinEntry(e.target.value)} placeholder="Contraseña"
                                    className="w-full bg-zinc-800 border border-zinc-700 text-white px-4 py-3 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-center font-mono" />
                                {error && <p className="text-red-500 text-xs text-center">{error}</p>}
                                <button type="submit" className="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 transition">Acceder</button>
                            </form>
                            <p className="text-center text-zinc-600 text-[10px] mt-8 uppercase tracking-[0.2em] font-bold">Protocolo de Acceso Seguro v2.0</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-zinc-50 p-6 md:p-12 font-sans animate-in fade-in">
                    <div className="max-w-2xl mx-auto bg-white p-8 rounded-3xl shadow-sm border border-zinc-100">
                        <div className="flex items-center justify-between mb-2">
                            <h1 className="text-3xl font-bold text-zinc-900">Farmacia Vibracional</h1>
                            <button onClick={()=>setIsAuthenticated(false)} className="text-[10px] text-zinc-400 uppercase font-bold hover:text-indigo-600 transition">Cerrar Sesión</button>
                        </div>
                        <p className="text-zinc-500 mb-8">Generador de frecuencias para terapia sonora y bienestar.</p>
                        <div className="space-y-6">
                            <div className="bg-zinc-900 rounded-2xl p-1 overflow-hidden border border-zinc-800 shadow-inner">
                                <canvas ref={canvasRef} width="600" height="200" className="w-full h-40 opacity-90" />
                            </div>
                            <div className="grid grid-cols-2 sm:grid-cols-4 gap-2">
                                {presets.map(p => (
                                    <button key={p.name} onClick={() => setFrequenciesInput(p.freq.join(','))}
                                        className={`text-[9px] uppercase tracking-wider font-bold py-2 px-3 rounded-lg transition ${p.color} hover:opacity-80`}>{p.name}</button>
                                ))}
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-zinc-700 mb-2">Frecuencias (Hz, separadas por coma)</label>
                                <input type="text" value={frequenciesInput} onChange={e=>setFrequenciesInput(e.target.value)}
                                    className="w-full px-4 py-3 rounded-xl border border-zinc-200 focus:ring-2 focus:ring-indigo-500 outline-none font-mono" />
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label className="block text-sm font-bold text-zinc-700 mb-2 flex items-center gap-2"><Icon name="clock" size={16} /> Duración ({duration}m)</label>
                                    <input type="range" min="0" max="60" value={duration} onChange={e=>setDuration(parseInt(e.target.value))} className="w-full" />
                                </div>
                                <div>
                                    <label className="block text-sm font-bold text-zinc-700 mb-2 flex items-center gap-2"><Icon name="volume-2" size={16} /> Volumen ({Math.round(volume*100)}%)</label>
                                    <input type="range" min="0" max="1" step="0.01" value={volume} onChange={e=>setVolume(parseFloat(e.target.value))} className="w-full" />
                                </div>
                            </div>
                            <button onClick={isPlaying ? stopAudio : playAudio} className={`w-full flex items-center justify-center gap-3 py-4 rounded-xl font-bold text-lg transition shadow-lg ${isPlaying ? 'bg-zinc-800 text-white' : 'bg-indigo-600 text-white shadow-indigo-200'}`}>
                                <Icon name={isPlaying ? "square" : "play"} size={20} className="fill-current" />
                                {isPlaying ? 'Detener Terapia' : 'Iniciar Terapia'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
