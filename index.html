<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmacia Vibracional PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input[type=range] { accent-color: #4f46e5; cursor: pointer; }
        .session-card { transition: all 0.2s; }
        .session-card:active { transform: scale(0.98); }
    </script>
</head>
<body class="bg-slate-50 min-h-screen p-4 font-sans">

    <div class="max-w-md mx-auto bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border-4 border-slate-100">
        <div class="bg-indigo-600 p-6 text-white text-center">
            <h1 class="text-2xl font-black italic tracking-tighter">FARMACIA VIBRACIONAL</h1>
            <div id="status-light" class="inline-block w-2 h-2 rounded-full bg-red-400 mr-2"></div>
            <span class="text-[10px] uppercase font-bold opacity-70">Sistema de Bio-Resonancia</span>
        </div>

        <div class="p-6 space-y-6">
            <div class="text-center">
                <label class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest">Frecuencia Actual (Hz)</label>
                <input type="number" id="freq-input" value="528" step="0.01" oninput="updateFrequency()" 
                       class="w-full text-5xl font-mono text-center outline-none py-2 text-slate-800">
            </div>

            <div class="space-y-4 bg-slate-50 p-4 rounded-2xl">
                <div>
                    <div class="flex justify-between text-[10px] font-bold text-slate-500 uppercase mb-2">
                        <span>Volumen Máster</span> <span id="vol-txt">60%</span>
                    </div>
                    <input type="range" id="vol-input" min="0" max="1" step="0.01" value="0.6" oninput="updateParams()" class="w-full">
                </div>

                <div>
                    <div class="flex justify-between text-[10px] font-bold text-slate-500 uppercase mb-2">
                        <span>Separación Binaural</span> <span id="bin-txt">0%</span>
                    </div>
                    <input type="range" id="bin-input" min="0" max="10" step="0.1" value="0" oninput="updateParams()" class="w-full">
                </div>
            </div>

            <button id="play-btn" onclick="toggleTerapia()" 
                    class="w-full py-6 bg-slate-900 text-white rounded-2xl text-xl font-black shadow-xl transition-all active:scale-95">
                INICIAR TERAPIA
            </button>

            <div class="pt-4 border-t border-slate-100">
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Guardar en Mi Botiquín</label>
                <div class="flex gap-2 mt-2">
                    <input type="text" id="session-name" placeholder="Ej: Rinitis, Sueño..." 
                           class="flex-1 bg-slate-100 border-none rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 ring-indigo-200">
                    <button onclick="saveSession()" class="bg-indigo-100 text-indigo-600 px-6 rounded-xl font-bold hover:bg-indigo-200">+</button>
                </div>
                
                <div id="sessions-list" class="mt-4 grid grid-cols-1 gap-2 max-h-48 overflow-y-auto pr-1">
                    </div>
            </div>
        </div>
    </div>

    <script>
        let audioCtx = null;
        let mainOsc = null;
        let mainGain = null;
        let isRunning = false;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                mainOsc = audioCtx.createOscillator();
                mainGain = audioCtx.createGain();
                
                mainOsc.type = 'sine';
                mainGain.gain.setValueAtTime(0, audioCtx.currentTime); // Inicia en silencio
                
                mainOsc.connect(mainGain);
                mainGain.connect(audioCtx.destination);
                mainOsc.start();
            }
        }

        function updateParams() {
            const vol = document.getElementById('vol-input').value;
            const bin = document.getElementById('bin-input').value;
            
            document.getElementById('vol-txt').innerText = Math.round(vol * 100) + "%";
            document.getElementById('bin-txt').innerText = Math.round((bin / 10) * 100) + "%";
            
            if (isRunning && mainGain) {
                mainGain.gain.setTargetAtTime(vol, audioCtx.currentTime, 0.05);
            }
            updateFrequency();
        }

        function updateFrequency() {
            if (mainOsc) {
                const baseFreq = parseFloat(document.getElementById('freq-input').value) || 0;
                const binOffset = parseFloat(document.getElementById('bin-input').value) || 0;
                mainOsc.frequency.setTargetAtTime(baseFreq + binOffset, audioCtx.currentTime, 0.05);
            }
        }

        function toggleTerapia() {
            initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const btn = document.getElementById('play-btn');
            const light = document.getElementById('status-light');

            if (!isRunning) {
                isRunning = true;
                mainGain.gain.setTargetAtTime(document.getElementById('vol-input').value, audioCtx.currentTime, 0.1);
                btn.innerText = "DETENER TERAPIA";
                btn.className = "w-full py-6 bg-red-600 text-white rounded-2xl text-xl font-black shadow-xl transition-all";
                light.className = "inline-block w-2 h-2 rounded-full bg-green-400 mr-2 animate-pulse";
            } else {
                isRunning = false;
                mainGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
                btn.innerText = "INICIAR TERAPIA";
                btn.className = "w-full py-6 bg-slate-900 text-white rounded-2xl text-xl font-black shadow-xl transition-all";
                light.className = "inline-block w-2 h-2 rounded-full bg-red-400 mr-2";
            }
        }

        // GESTIÓN DE SESIONES
        function saveSession() {
            const name = document.getElementById('session-name').value || "Frecuencia " + document.getElementById('freq-input').value;
            const session = {
                name: name,
                freq: document.getElementById('freq-input').value,
                bin: document.getElementById('bin-input').value
            };
            let sessions = JSON.parse(localStorage.getItem('farmacia_vibracional') || '[]');
            sessions.push(session);
            localStorage.setItem('farmacia_vibracional', JSON.stringify(sessions));
            document.getElementById('session-name').value = "";
            renderSessions();
        }

        function renderSessions() {
            const list = document.getElementById('sessions-list');
            const sessions = JSON.parse(localStorage.getItem('farmacia_vibracional') || '[]');
            list.innerHTML = sessions.map((s, index) => `
                <div class="session-card flex justify-between items-center bg-slate-50 p-3 rounded-xl border border-slate-100">
                    <div class="cursor-pointer flex-1" onclick="loadSession(${index})">
                        <p class="font-bold text-sm text-slate-700">${s.name}</p>
                        <p class="text-[10px] text-indigo-500 font-mono">${s.freq} Hz + ${s.bin} Hz</p>
                    </div>
                    <button onclick="deleteSession(${index})" class="text-slate-300 hover:text-red-400 text-xs px-2">✕</button>
                </div>
            `).join('');
        }

        function loadSession(index) {
            const sessions = JSON.parse(localStorage.getItem('farmacia_vibracional') || '[]');
            const s = sessions[index];
            document.getElementById('freq-input').value = s.freq;
            document.getElementById('bin-input').value = s.bin;
            updateParams();
        }

        function deleteSession(index) {
            let sessions = JSON.parse(localStorage.getItem('farmacia_vibracional') || '[]');
            sessions.splice(index, 1);
            localStorage.setItem('farmacia_vibracional', JSON.stringify(sessions));
            renderSessions();
        }

        // Iniciar lista al cargar
        renderSessions();
    </script>
</body>
</html>
